name: Deploy Hugo site to Pages

on:
  push:
    branches:
      - main
      - preview

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          submodules: recursive
          path: main-src

      - name: Checkout preview (if exists)
        id: checkout-preview
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: preview
          submodules: recursive
          path: preview-src

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build production (main)
        run: |
          cd main-src
          hugo --minify --baseURL "https://ungyga.org/"
          mkdir -p ../dist
          cp -r public/* ../dist/

      - name: Build preview
        if: steps.checkout-preview.outcome == 'success'
        run: |
          cd preview-src
          hugo --minify --baseURL "https://ungyga.org/preview/"
          mkdir -p ../dist/preview
          cp -r public/* ../dist/preview/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
