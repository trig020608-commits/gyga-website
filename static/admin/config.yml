backend:
  name: github
  repo: trig020608-commits/gyga-website
  branch: main
  base_url: https://gyga-oauth.trig020608.workers.dev

media_folder: static/images
public_folder: /images

i18n:
  structure: multiple_files
  locales: [en, fr, zh]
  default_locale: en

collections:
  - name: "news"
    label: "新闻 / News / Actualités"
    folder: "content/news"
    create: true
    i18n: true
    fields:
      - {label: "标题", name: "title", widget: "string", i18n: true}
      - {label: "日期", name: "date", widget: "datetime"}
      - {label: "封面图", name: "image", widget: "image", required: false}
      - {label: "内容", name: "body", widget: "markdown", i18n: true}

  - name: "programs"
    label: "项目 / Programs / Programmes"
    folder: "content/programs"
    create: true
    i18n: true
    fields:
      - {label: "项目名称", name: "title", widget: "string", i18n: true}
      - {label: "描述", name: "description", widget: "text", i18n: true}
      - {label: "内容", name: "body", widget: "markdown", i18n: true}
